<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profeena Mobile Showroom</title>
    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        /* Header Style */
        header {
            text-align: center;
            background-color: #0A3D62; /* Dark Blue */
            color: white;
            padding: 20px;
            border-bottom: 4px dashed #7724e4;
        }
        header h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
        }
        header h3 {
            font-weight: 400;
            opacity: 0.9;
        }

        /* Section Title */
        h2 {
            text-align: center;
            margin: 30px 0;
            font-size: 2rem;
            color: #0A3D62;
            position: relative;
        }

        /* Grid Container (Intha magic thaan responsive aakum) */
        .offers-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }

        /* Individual Product Card */
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px); /* Hover effect */
        }

        /* Responsive Images */
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover; /* Image structural ah collapse aagama iruka */
            background-color: #eaeaea; /* Image load aagalana intha gray color theriyum */
        }

        /* Price Tag */
        .card p {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e74c3c;
            padding: 15px 0;
            background-color: #fff;
        }
    </style>
</head>
<body>

    <header>
        <h1>PROFEENA MOBILE SHOWROOM</h1>
        <h3>Near Old Bus Stand, Tirupur</h3>
    </header>

    <h2>🔥 OFFERS 🔥</h2>

    <div class="offers-container">
        
        <div class="card">
            <img src="/mobileshowroom/images/OFFER1.webp" alt="Mobile Offer 1">
            <p>₹10,000</p>
        </div>

        <div class="card">
            <img src="/mobileshowroom/images/OFFER2.webp" alt="TV Offer">
            <p>₹20,000</p>
        </div>

        <div class="card">
            <img src="/mobileshowroom/images/OFFER3.webp" alt="Mobile Offer 2">
            <p>₹30,000</p>
        </div>

    </div>

</body>
</html>
